model = "gpt-5.4"
model_reasoning_effort = "xhigh"
personality = "pragmatic"

[features]
multi_agent = true

[agents]
max_threads = 10
max_depth = 3
job_max_runtime_seconds = 3600

[agents.subgoal-prover]
description = "An agent that proves all the subgoals in a subgoal decomposition plan."
config_file = "./agents/subgoal-prover.toml" 

[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.2" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"


[mcp_servers.reasoning_agent]
command = "python3"
args = ["./mcp/server.py"]
cwd = "./"
tool_timeout_sec = 3600
env_vars = [
    "PATH",
    "HOME",
    "GALOIS_REASONING_RUNTIME_DIR",
    "GALOIS_REASONING_WORKDIR",
    "GALOIS_REASONING_ASSET_DIR",
    "GALOIS_REASONING_PROBLEM_ID",
    "GALOIS_REASONING_REFERENCE_DIR",
    "RESULTS_DIR",
    "MEMORY_DIR",
    "DOWNLOADS_DIR",
    "SCRIPTS_DIR",
    "OPENAI_BASE_URL",
    "OPENAI_API_KEY",
    "GEMINI_BASE_URL",
    "GEMINI_API_KEY",
]
