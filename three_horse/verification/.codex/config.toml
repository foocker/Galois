model = "gpt-5.4"
model_reasoning_effort = "xhigh"
personality = "pragmatic"

[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.2" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"


# verification-agent-mcp
[mcp_servers.verification_agent]
command = "python3"
args = ["./mcp/server.py"]
cwd = "./"
tool_timeout_sec = 3600
env_vars = [
    "PATH",
    "HOME",
    "GALOIS_VERIFICATION_AGENT_DIR",
    "GALOIS_VERIFICATION_WORKDIR",
    "GALOIS_VERIFICATION_RUNTIME_DIR",
    "GALOIS_VERIFICATION_RESULTS_DIR",
    "OPENAI_BASE_URL",
    "OPENAI_API_KEY",
    "GEMINI_BASE_URL",
    "GEMINI_API_KEY",
]